<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
</head>
<body>
    <h1>Registro</h1>
    <hr><br>
    <form>  
        <label for="username">Nome de usuário:</label>
        <input
            required
            name="username"
            type="text"
            id="username"
            placeholder="Digite seu nome de usuário"
        />
        <br><br>
        <label for="email">Email:</label>
        <input
            required
            name="email"
            type="email"
            id="email"
            placeholder="Digite seu email"
        />
        <br><br>
        <label for="matricula">Matrícula:</label>
        <input
            required
            name="matricula"
            type="number"
            id="matricula"
            placeholder="Digite sua matrícula"
        />
        <br><br>

        <label for="password">Senha:</label>
        <input
            required
            name="password"
            type="password"
            id="password"
            placeholder="Digite sua senha"
        />
        <br><br>
        <label for="cor_preferida">Escolha sua cor preferida:</label>
        <input
            required
            name="cor_preferida"
            type="color"
            id="cor_preferida"
        />
        <br><br><hr><br>
        <button type="submit">Registrar</button>
        <br><br><hr><br>
        <a href="../menu.html">Voltar ao Menu</a>
    </form>
    
</body>
</html>
