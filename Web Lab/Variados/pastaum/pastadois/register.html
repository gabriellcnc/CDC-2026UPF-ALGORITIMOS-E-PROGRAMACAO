<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
</head>
<body>
    <header></header><h1>Registro</h1></header>
    <hr><br>
    <main>
        <form>  
            <label for="username">Nome de usuário:</label>
            <input
                required
                name="username"
                type="text"
                id="username"
                placeholder="Digite seu nome de usuário"
            />
            <br><br>
            <label for="email">Email:</label>
            <input
                required
                name="email"
                type="email"
                id="email"
                placeholder="Digite seu email"
            />
            <br><br>
            <label for="matricula">Matrícula:</label>
            <input
                required
                name="matricula"
                type="number"
                id="matricula"
                placeholder="Digite sua matrícula"
            />
            <br><br>

            <label for="password">Senha:</label>
            <input
                required
                name="password"
                type="password"
                id="password"
                placeholder="Digite sua senha"
            />
            <br><br>
            <label for="cor_preferida">Escolha sua cor preferida:</label>
            <input
                required
                name="cor_preferida"
                type="color"
                id="cor_preferida"
            />
            <br><br><hr><br>
            <button type="submit">Registrar</button>
            <br><br>
            <a href="login.html">Já tem uma conta? Faça login</a>
            <br><br><hr><br>
            <a href="../menu.html">Voltar ao Menu</a>

        </form>
    </main>
</body>
</html>
