<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">

    <style>
        .background {
            background-color: rgb(51, 51, 51);
        }

        .texto {
            font-family: "JetBrains Mono", monospace;
            font-optical-sizing: auto;
            font-size: 22px;
            max-width: 60ch;
            color: rgb(255, 0, 0);
            font-style: italic;
            font-weight: 600;
            font-variant:small-caps;
            text-transform: capitalize;
            line-height: 30px;
            letter-spacing: 5px;
            text-align:left;
        } 
    </style>

</head>
<body class="background">
    <p class="texto">
        Os Gnomos são os guardiões dos tesouros da terra e metais, fazendo com que estes não sejam encontrados todos em um só dia, sendo distribuídos pouco a pouco. Eles têm uma estatura pequena de mais ou menos 2 palmos e habitam as montanhas.
    </p>
</body>
</html>
